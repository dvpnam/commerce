{% extends "auctions/layout.html" %}

{% block body %}

  <h2>My Watchlist</h2>

  {% for listing in listings %}

    <div>
      <a href="{% url 'listing' listing.id %}">{{ listing.title }}</a>
      - ${{ listing.current_price }}
    </div>

  {% empty %}
    <p>Your watchlist is empty.</p>
  
  {% endfor %}
  
{% endblock %}
